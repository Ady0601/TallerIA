<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clasificador de Ropa</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700&display=swap" rel="stylesheet">
    <style>
     
        body {
            background-color: #f4eee1; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .tarjeta {
            background: #ffffff;
            padding: 40px;
            border-radius: 25px;
            width: 380px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        h1 {
            color: #5d5d5d;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

     
        .zona-carga {
            background: #fdfdfb;
            border: 1px dashed #b2ba9c;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
        }

        input[type="file"] {
            font-size: 12px;
            color: #888;
        }

        .btn-analizar {
            background: #5a8d9a; 
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .btn-analizar:hover {
            background: #4a747f;
        }

        .bloque-resultado {
            margin-top: 30px;
            padding: 20px;
            background: #e59a87;
            color: white;
            border-radius: 15px;
        }

        .etiqueta-resultado {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: block;
            margin-bottom: 5px;
            opacity: 0.9;
        }

        .valor-prenda {
            font-size: 24px;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="tarjeta">
        <h1>Clasificador de Ropa</h1>

        <form method="post" enctype="multipart/form-data">
            <div class="zona-carga">
                <input type="file" name="file" accept="image/*" required>
            </div>
            <button type="submit" class="btn-analizar">Analizar Prenda</button>
        </form>

        {% if prediccion %}
            <div class="bloque-resultado">
                <span class="etiqueta-resultado">La prenda es:</span>
                <div class="valor-prenda">{{ prediccion }}</div>
            </div>
        {% endif %}
    </div>

</body>
</html>
